<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>MNC InfoPoint – Emergenza</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f9f9f9;
      margin: 0;
      padding: 0;
      text-align: center;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .header {
      margin-top: 2em;
      margin-bottom: 1em;
      position: relative;
      width: 100%;
      max-width: 400px;
      margin-left: auto;
      margin-right: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .lang-back {
      position: absolute;
      top: 0;
      right: 0;
      z-index: 10;
    }

    .btn-lang {
      background: #e0e0e0;
      color: #111;
      font-size: 1em;
      border: none;
      border-radius: 10px;
      padding: 0.7em 1em;
      cursor: pointer;
      font-weight: bold;
      text-decoration: none;
      transition: background 0.2s;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      display: inline-block;
    }

    .btn-lang:hover {
      background: #cccccc;
    }

    .logo {
      width: 80vw;
      max-width: 300px;
      margin-bottom: 1em;
      display: block;
    }

    h1 {
      font-size: 2em;
      color: #222;
      font-weight: bold;
      margin: 0 0 0.2em 0;
    }

    .subtitle {
      color: #666;
      font-size: 1em;
      margin-bottom: 1em;
    }

    .emergency-title {
      background: #d32f2f;
      color: #fff;
      font-size: 2em;
      font-weight: bold;
      padding: 0.7em;
      margin-bottom: 1.5em;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(211,47,47,0.10);
      letter-spacing: 1px;
      width: 100%;
      max-width: 400px;
      box-sizing: border-box;
      text-align: center;
    }

    .tiles {
      display: flex;
      flex-direction: column;
      gap: 1em;
      max-width: 400px;
      width: 100%;
      margin: 0 auto 2em auto;
      align-items: stretch;
    }

    .tile {
      background: #d32f2f;
      color: #fff;
      font-size: 1.2em;
      font-weight: bold;
      border-radius: 12px;
      padding: 1em;
      cursor: pointer;
      text-decoration: none;
      transition: background 0.2s, transform 0.1s;
      box-shadow: 0 2px 10px rgba(211,47,47,0.10);
      display: block;
      letter-spacing: 0.5px;
    }

    .tile:hover,
    .tile:active {
      background: #b71c1c;
      transform: scale(0.99);
    }

    .plan-title {
      background: #444;
      margin-top: 0.5em;
      margin-bottom: 1em;
    }

    .plan-tile {
      background: #555;
      font-size: 1.05em;
    }

    .plan-tile:hover,
    .plan-tile:active {
      background: #333;
    }

    @media (max-width: 500px) {

      .lang-back {
        position: fixed;
        top: 10px;
        right: 10px;
      }

      .logo {
        max-width: 220px;
      }

      .emergency-title,
      .tiles {
        max-width: 95vw;
      }

      .tile {
        font-size: 1em;
        padding: 0.9em;
      }
    }
  </style>
</head>

<body>

  <div class="header">

    <div class="lang-back">
      <a class="btn-lang" id="btnBack" href="#">
        🌐 Lingua
      </a>
    </div>

    <img src="logo.png" alt="MNC Logo" class="logo">

    <h1>InfoPoint</h1>

    <div class="subtitle">
      Italiano
    </div>

  </div>

  <div class="emergency-title">
    Emergenza
  </div>

  <div class="tiles">

    <a class="tile" href="tel:112">
      Emergenza generale 112
    </a>

    <a class="tile" href="tel:118">
      Pompieri 118
    </a>

    <a class="tile" href="tel:144">
      Ambulanza (Servizio sanitario) 144
    </a>

    <a class="tile" href="tel:1414">
      REGA (Soccorso aereo) 1414
    </a>

    <a class="tile" href="tel:145">
      TOX (Intossicazione) 145
    </a>

  </div>

  <div class="emergency-title plan-title">
    Piani di emergenza
  </div>

  <div class="tiles plan-tiles">

    <a class="tile plan-tile"
       href="erste-hilfe.pdf"
       target="_blank">
      Primo soccorso
    </a>

    <a class="tile plan-tile"
       href="erste-hilfe-elektrounfall.pdf"
       target="_blank">
      Primo soccorso – incidenti elettrici
    </a>

    <a class="tile plan-tile"
       href="brand.pdf"
       target="_blank">
      Incendio / Evacuazione
    </a>

    <a class="tile plan-tile"
       href="elektrobrand.pdf"
       target="_blank">
      Incendio elettrico
    </a>

    <a class="tile plan-tile"
       href="umweltgefaehrdung.pdf"
       target="_blank">
      Pericolo ambientale
    </a>

  </div>

  <script>

    const params = new URLSearchParams(window.location.search);

    const id = params.get("id") || "MNC";

    document.getElementById("btnBack").href =
      `it.html?id=${encodeURIComponent(id)}`;

  </script>

</body>
</html>
